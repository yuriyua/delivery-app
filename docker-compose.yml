services:
  node-api:
    build:
      context: ./node-backend
      dockerfile: Dockerfile
    container_name: delivery-api
    ports:
      - "${API_PORT}:${API_PORT}"
    volumes:
      - ./node-backend:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - PORT=${API_PORT}
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=${NODE_ENV}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push && 
             npx prisma db seed && 
             npm run dev"
    networks:
      - app-network
  python-api:
    build: ./python-backend
    container_name: python-api
    ports:
      - "8000:8000"
    volumes:
      - ./python-backend:/app
    env_file:
      - .env
    environment:
      - DB_HOST=db
    depends_on:
      - db
    networks:
      - app-network
  frontend:
    build:
      context: ./frontend
    container_name: delivery-frontend
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - ./.env:/app/.env
  db:
    image: mysql:8.4
    container_name: delivery-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USER}", "-p${DB_PASSWORD}"]
      timeout: 5s
      retries: 5
      interval: 10s
    networks:
      - app-network
networks:
  app-network:
    driver: bridge
volumes:
  db_data:
  frontend-node-modules:

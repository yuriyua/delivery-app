services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: delivery-api
    ports:
      - "${API_PORT}:${API_PORT}"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=${API_PORT}
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=${NODE_ENV}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
  db:
    image: mysql:8.4
    container_name: delivery-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USER}", "-p${DB_PASSWORD}"]
      timeout: 5s
      retries: 5
      interval: 10s
    networks:
      - app-network
networks:
  app-network:
    driver: bridge
volumes:
  db_data:
